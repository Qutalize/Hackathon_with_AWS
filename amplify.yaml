version: 1
frontend:
  phases:
    build:
      commands:
        - echo "LAMBDA_URL=${LAMBDA_URL}"
        - sed -i "s|LAMBDA_FUNCTION_URL|${LAMBDA_URL}|g" index.html
        - grep "API_URL" index.html
  artifacts:
    baseDirectory: /
    files:
      - "**/*"
  cache:
    paths: []
