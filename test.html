<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新商品提案システム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", sans-serif;
      background: #f0f2f5;
      padding: 32px 16px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
      color: #232f3e;
    }
    p.subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }
    .date-picker {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .date-picker label { font-size: 14px; color: #333; }
    .date-picker input[type="date"] {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .btn {
      display: block;
      margin: 0 auto 32px;
      padding: 14px 40px;
      font-size: 18px;
      background: #ff9900;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #status {
      text-align: center;
      color: #666;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .period-label {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .trends {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto 40px;
    }
    @media(max-width: 600px) { .trends { grid-template-columns: 1fr; } }
    .trend-box {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .trend-box h2 {
      font-size: 16px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eee;
    }
    .trend-box.top h2    { color: #e07b00; border-color: #ff9900; }
    .trend-box.bottom h2 { color: #c0392b; border-color: #e74c3c; }
    .trend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-score { font-weight: bold; font-size: 14px; min-width: 60px; text-align: right; }
    .score-positive { color: #27ae60; }
    .score-negative { color: #e74c3c; }
    .proposals { max-width: 1000px; margin: 0 auto; }
    .proposals h2 { font-size: 20px; margin-bottom: 20px; color: #232f3e; text-align: center; }
    .proposal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media(max-width: 700px) { .proposal-grid { grid-template-columns: 1fr; } }
    .proposal-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .proposal-card img { width: 100%; height: 200px; object-fit: cover; }
    .no-image {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px;
    }
    .card-body { padding: 16px; }
    .card-body h3 { font-size: 16px; margin-bottom: 10px; color: #232f3e; }
    .tag {
      display: inline-block;
      background: #fff3e0; color: #e07b00;
      border-radius: 4px; padding: 2px 8px;
      font-size: 12px; margin: 2px 2px 8px 0;
    }
    .card-body p { font-size: 13px; color: #555; line-height: 1.6; margin-top: 4px; }
    .label { font-size: 11px; color: #999; margin-top: 8px; }
    .error-box {
      max-width: 600px; margin: 0 auto; padding: 20px;
      background: #ffeaea; border-radius: 8px;
      color: #c0392b; text-align: center;
    }
  </style>
</head>
<body>

  <h1>🛒 新商品提案システム</h1>
  <p class="subtitle">期間を選択して、売れ行きデータから新商品を提案します</p>

  <div class="date-picker">
    <label>📅 開始日</label>
    <input type="date" id="date-from" value="2026-03-01">
    <span>〜</span>
    <label>終了日</label>
    <input type="date" id="date-to" value="2026-03-31">
  </div>

  <button class="btn" id="btn" onclick="getProposal()">
    この期間で提案を生成する
  </button>
  <div id="status"></div>
  <div class="period-label" id="period-label"></div>

  <div class="trends" id="trends" style="display:none">
    <div class="trend-box top">
      <h2>📈 人気トピック TOP10</h2>
      <div id="top-list"></div>
    </div>
    <div class="trend-box bottom">
      <h2>📉 売れ残りトピック TOP10</h2>
      <div id="worst-list"></div>
    </div>
  </div>

  <div class="proposals" id="proposals" style="display:none">
    <h2>💡 新商品提案</h2>
    <div class="proposal-grid" id="proposal-grid"></div>
  </div>

  <div id="error-area"></div>

  <script>
    // ✅ API GatewayのURLをここに設定
    const API_URL = "newproduct_proposal_api"
    async function getProposal() {
      const btn      = document.getElementById("btn");
      const status   = document.getElementById("status");
      const dateFrom = document.getElementById("date-from").value;
      const dateTo   = document.getElementById("date-to").value;

      if (!dateFrom || !dateTo) { alert("開始日と終了日を選択してください"); return; }
      if (dateFrom > dateTo)    { alert("開始日は終了日より前に設定してください"); return; }

      btn.disabled    = true;
      btn.textContent = "生成中...";
      status.textContent = "⏳ データを分析中...（約15秒かかります）";
      document.getElementById("period-label").textContent = "";
      document.getElementById("trends").style.display    = "none";
      document.getElementById("proposals").style.display = "none";
      document.getElementById("error-area").innerHTML    = "";

      try {
        const res  = await fetch(API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date_from: dateFrom, date_to: dateTo })
        });

        const data = await res.json();
        const body = JSON.parse(data.body);

        if (body.error) {
          document.getElementById("error-area").innerHTML =
            `<div class="error-box">⚠️ ${body.error}<br>
             <small>期間：${dateFrom} 〜 ${dateTo}</small></div>`;
          status.textContent = "";
          return;
        }

        document.getElementById("period-label").textContent =
          `分析期間：${body.date_from} 〜 ${body.date_to}`;

        renderTrends(body.top_trends, body.worst_trends);
        renderProposals(body.proposals, body.images || []);
        status.textContent = "✅ 生成完了";

      } catch(e) {
        status.textContent = "❌ エラー：" + e.message;
      } finally {
        btn.disabled    = false;
        btn.textContent = "この期間で提案を生成する";
      }
    }

    function renderTrends(topList, worstList) {
      document.getElementById("top-list").innerHTML =
        topList.map((r, i) => `
          <div class="trend-item">
            <span>${i+1}. ${r.genre} × ${r.keyword_1} × ${r.keyword_2}</span>
            <span class="trend-score score-positive">
              +${parseFloat(r.popularity_score).toFixed(1)}
            </span>
          </div>`).join("");

      document.getElementById("worst-list").innerHTML =
        worstList.map((r, i) => `
          <div class="trend-item">
            <span>${i+1}. ${r.genre} × ${r.keyword_1} × ${r.keyword_2}</span>
            <span class="trend-score score-negative">
              ${parseFloat(r.popularity_score).toFixed(1)}
            </span>
          </div>`).join("");

      document.getElementById("trends").style.display = "grid";
    }

    function renderProposals(proposalText, images) {
      const blocks = proposalText.split(/\n(?=\d+\.)/).filter(b => b.trim());
      document.getElementById("proposal-grid").innerHTML =
        blocks.map((block, i) => {
          const name    = (block.match(/商品名：(.+)/)    ||[])[1] || "";
          const genre   = (block.match(/ジャンル：(.+)/)  ||[])[1] || "";
          const keyword = (block.match(/キーワード：(.+)/)||[])[1] || "";
          const basis   = (block.match(/根拠：(.+)/)      ||[])[1] || "";
          const target  = (block.match(/ターゲット：(.+)/)||[])[1] || "";
          const imgData = images[i];
          const imgHtml = (imgData && imgData.base64)
            ? `<img src="data:image/png;base64,${imgData.base64}" alt="${name}">`
            : `<div class="no-image">🖼️ 画像なし</div>`;
          const tags = keyword.split("・")
            .map(k => `<span class="tag">${k.trim()}</span>`).join("");
          return `
            <div class="proposal-card">
              ${imgHtml}
              <div class="card-body">
                <h3>${name}</h3>
                <span class="tag">${genre}</span>${tags}
                <p class="label">📊 根拠</p><p>${basis}</p>
                <p class="label">🎯 ターゲット</p><p>${target}</p>
              </div>
            </div>`;
        }).join("");

      document.getElementById("proposals").style.display = "block";
    }
  </script>
</body>
</html>
